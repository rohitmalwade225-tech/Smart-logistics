<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Reports')}"></head>
<body class="layout-wrapper">
<div th:replace="~{fragments/layout :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/layout :: navbar}"></div>
    <div class="page-content">
        <div class="page-header">
            <div><h1 class="page-title">Reports &amp; Analytics</h1><p class="page-subtitle">Business intelligence and performance metrics</p></div>
            <div class="page-actions">
                <button class="btn btn-outline-secondary" onclick="window.print()"><i class="bi bi-printer me-1"></i>Print</button>
                <button class="btn btn-primary" onclick="exportReport()"><i class="bi bi-download me-1"></i>Export</button>
            </div>
        </div>

        <!-- KPIs -->
        <div class="row g-4 mb-4">
            <div class="col-6 col-md-3">
                <div class="kpi-card kpi-primary">
                    <div class="kpi-icon"><i class="bi bi-cart3"></i></div>
                    <div class="kpi-content"><span class="kpi-label">Total Orders</span><span class="kpi-value" th:text="${stats.totalOrders}">0</span></div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="kpi-card kpi-success">
                    <div class="kpi-icon"><i class="bi bi-cash-stack"></i></div>
                    <div class="kpi-content">
                        <span class="kpi-label">Total Revenue</span>
                        <span class="kpi-value" th:text="'$' + ${#numbers.formatDecimal(stats.totalRevenue, 1, 'COMMA', 0, 'POINT')}">$0</span>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="kpi-card kpi-purple">
                    <div class="kpi-icon"><i class="bi bi-boxes"></i></div>
                    <div class="kpi-content">
                        <span class="kpi-label">Inventory Value</span>
                        <span class="kpi-value" th:text="'$' + ${#numbers.formatDecimal(stats.inventoryValue, 1, 'COMMA', 0, 'POINT')}">$0</span>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="kpi-card kpi-teal">
                    <div class="kpi-icon"><i class="bi bi-truck"></i></div>
                    <div class="kpi-content"><span class="kpi-label">Total Shipments</span><span class="kpi-value" th:text="${stats.totalShipments}">0</span></div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-12 col-lg-8">
                <div class="card-panel">
                    <div class="panel-header"><h3 class="panel-title">Annual Revenue Trend</h3></div>
                    <div id="revenueChart" style="height:320px;"></div>
                </div>
            </div>
            <div class="col-12 col-lg-4">
                <div class="card-panel">
                    <div class="panel-header"><h3 class="panel-title">Warehouse Utilization</h3></div>
                    <div id="warehouseChart" style="height:320px;"></div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-12 col-lg-6">
                <div class="card-panel">
                    <div class="panel-header"><h3 class="panel-title">Shipment Performance</h3></div>
                    <div id="shipmentChart" style="height:280px;"></div>
                </div>
            </div>
            <div class="col-12 col-lg-6">
                <div class="card-panel">
                    <div class="panel-header"><h3 class="panel-title">Entity Summary</h3></div>
                    <div class="report-summary-grid">
                        <div class="summary-item"><span class="summary-icon bg-primary-light"><i class="bi bi-people text-primary"></i></span><span class="summary-label">Customers</span><span class="summary-value" th:text="${stats.totalCustomers}">0</span></div>
                        <div class="summary-item"><span class="summary-icon bg-success-light"><i class="bi bi-box-seam text-success"></i></span><span class="summary-label">Products</span><span class="summary-value" th:text="${stats.totalProducts}">0</span></div>
                        <div class="summary-item"><span class="summary-icon bg-warning-light"><i class="bi bi-building text-warning"></i></span><span class="summary-label">Suppliers</span><span class="summary-value" th:text="${stats.totalSuppliers}">0</span></div>
                        <div class="summary-item"><span class="summary-icon bg-info-light"><i class="bi bi-house-gear text-info"></i></span><span class="summary-label">Warehouses</span><span class="summary-value" th:text="${stats.totalWarehouses}">0</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="app-footer"><span>&copy; 2024 Smart Logistics SCM</span><span>v1.0.0</span></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
function exportReport() {
    Swal.fire({ icon: 'info', title: 'Exporting...', text: 'Report export will be available in the full release.', timer: 2000, showConfirmButton: false });
}

(function() {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    new ApexCharts(document.getElementById('revenueChart'), {
        chart: { type: 'bar', height: 320, toolbar: { show: false } },
        series: [
            { name: 'Revenue', data: months.map(() => 50000 + Math.floor(Math.random()*150000)) },
            { name: 'Cost', data: months.map(() => 30000 + Math.floor(Math.random()*80000)) }
        ],
        colors: ['#4F46E5','#10B981'],
        xaxis: { categories: months },
        yaxis: { labels: { formatter: v => '$' + (v/1000).toFixed(0) + 'K' } },
        plotOptions: { bar: { columnWidth: '55%', borderRadius: 4 } },
        legend: { position: 'top' }
    }).render();

    new ApexCharts(document.getElementById('warehouseChart'), {
        chart: { type: 'donut', height: 320 },
        series: [64, 51, 35],
        labels: ['Main DC', 'East Coast', 'Midwest'],
        colors: ['#4F46E5','#10B981','#F59E0B'],
        plotOptions: { pie: { donut: { size: '60%' } } },
        legend: { position: 'bottom' }
    }).render();

    new ApexCharts(document.getElementById('shipmentChart'), {
        chart: { type: 'line', height: 280, toolbar: { show: false } },
        series: [
            { name: 'Shipped', data: months.map(() => 100 + Math.floor(Math.random()*400)) },
            { name: 'Delivered', data: months.map(() => 80 + Math.floor(Math.random()*350)) }
        ],
        colors: ['#6366F1','#10B981'],
        xaxis: { categories: months },
        stroke: { curve: 'smooth', width: 2 },
        legend: { position: 'top' }
    }).render();
})();
</script>
</body>
</html>
