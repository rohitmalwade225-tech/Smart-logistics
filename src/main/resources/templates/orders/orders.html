<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Orders')}"></head>
<body class="layout-wrapper">
<div th:replace="~{fragments/layout :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/layout :: navbar}"></div>
    <div class="page-content">
        <div class="page-header">
            <div><h1 class="page-title">Orders</h1><p class="page-subtitle">Manage customer orders</p></div>
            <a th:href="@{/orders/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New Order</a>
        </div>
        <div th:if="${success}" class="alert alert-success alert-dismissible d-flex" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div class="card-panel">
            <div class="table-responsive">
                <table id="ordersTable" class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Order #</th>
                            <th>Customer</th>
                            <th>Total</th>
                            <th>Payment</th>
                            <th>Status</th>
                            <th>Expected</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="o : ${orders}">
                            <td><a th:href="@{/orders/{id}(id=${o.id})}" class="fw-600 link-primary" th:text="${o.orderNumber}">ORD-001</a></td>
                            <td th:text="${o.customerName ?: '-'}">Customer</td>
                            <td th:text="'$' + ${#numbers.formatDecimal(o.totalAmount, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                            <td>
                                <span class="badge-status"
                                      th:classappend="${o.paymentStatus.name() == 'PAID'} ? 'status-delivered' :
                                                      (${o.paymentStatus.name() == 'PENDING'} ? 'status-pending' : 'status-warning')"
                                      th:text="${o.paymentStatus}">Payment</span>
                            </td>
                            <td>
                                <span class="badge-status"
                                      th:classappend="${o.status.name() == 'DELIVERED'} ? 'status-delivered' :
                                                      (${o.status.name() == 'PENDING'} ? 'status-pending' :
                                                      (${o.status.name() == 'SHIPPED'} ? 'status-shipped' :
                                                      (${o.status.name() == 'CANCELLED'} ? 'status-danger' : 'status-processing')))"
                                      th:text="${#strings.replace(o.status.name(), '_', ' ')}">Status</span>
                            </td>
                            <td th:text="${o.expectedDeliveryDate}">Date</td>
                            <td>
                                <div class="action-btns">
                                    <a th:href="@{/orders/{id}(id=${o.id})}" class="btn btn-xs btn-outline-secondary"><i class="bi bi-eye"></i></a>
                                    <a th:href="@{/orders/{id}/edit(id=${o.id})}" class="btn btn-xs btn-outline-primary"><i class="bi bi-pencil"></i></a>
                                    <form th:action="@{/orders/{id}/delete(id=${o.id})}" method="post" class="d-inline" onsubmit="return confirmDelete(this, 'order')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-xs btn-outline-danger"><i class="bi bi-trash3"></i></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <footer class="app-footer"><span>&copy; 2024 Smart Logistics SCM</span><span>v1.0.0</span></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>$(document).ready(function() { $('#ordersTable').DataTable({ pageLength: 15, order: [[0,'desc']] }); });</script>
</body>
</html>
