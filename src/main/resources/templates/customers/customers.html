<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Customers')}"></head>
<body class="layout-wrapper">
<div th:replace="~{fragments/layout :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/layout :: navbar}"></div>
    <div class="page-content">
        <div class="page-header">
            <div><h1 class="page-title">Customers</h1><p class="page-subtitle">Manage your customer base</p></div>
            <a th:href="@{/customers/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Customer</a>
        </div>
        <div th:if="${success}" class="alert alert-success alert-dismissible d-flex" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div class="card-panel">
            <div class="table-responsive">
                <table id="customersTable" class="table table-hover align-middle">
                    <thead>
                        <tr><th>Code</th><th>Name</th><th>Type</th><th>Contact</th><th>City</th><th>Credit Limit</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${customers}">
                            <td><code th:text="${c.code}">CUS</code></td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="entity-avatar" th:text="${#strings.substring(c.name,0,1)}">C</div>
                                    <div>
                                        <div class="fw-600" th:text="${c.name}">Name</div>
                                        <small class="text-muted" th:text="${c.email}">email</small>
                                    </div>
                                </div>
                            </td>
                            <td><span class="badge bg-light text-dark" th:text="${c.customerType}">Type</span></td>
                            <td>
                                <div th:text="${c.contactPerson}">Person</div>
                                <small class="text-muted" th:text="${c.phone}">Phone</small>
                            </td>
                            <td th:text="${c.city}">City</td>
                            <td th:text="'$' + ${#numbers.formatDecimal(c.creditLimit, 1, 'COMMA', 0, 'POINT')}">$0</td>
                            <td>
                                <span class="badge-status"
                                      th:classappend="${c.status.name() == 'ACTIVE'} ? 'status-delivered' : 'status-default'"
                                      th:text="${c.status}">Status</span>
                            </td>
                            <td>
                                <div class="action-btns">
                                    <a th:href="@{/customers/{id}/edit(id=${c.id})}" class="btn btn-xs btn-outline-primary"><i class="bi bi-pencil"></i></a>
                                    <form th:action="@{/customers/{id}/delete(id=${c.id})}" method="post" class="d-inline" onsubmit="return confirmDelete(this, 'customer')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-xs btn-outline-danger"><i class="bi bi-trash3"></i></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <footer class="app-footer"><span>&copy; 2024 Smart Logistics SCM</span><span>v1.0.0</span></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>$(document).ready(function() { $('#customersTable').DataTable({ pageLength: 15 }); });</script>
</body>
</html>
