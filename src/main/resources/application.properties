# ============================================================
# Smart Logistics & Supply Chain Management System
# Application Configuration
# ============================================================

spring.application.name=Smart Logistics SCM

server.port=${PORT:8080}

# ============================================================
# Oracle Database Configuration
# ============================================================
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/xepdb1
spring.datasource.username=C##ROHIT
spring.datasource.password=ROHIT
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ============================================================
# JPA / Hibernate
# FIRST RUN: use 'create' so DataInitializer can populate users
# AFTER FIRST RUN: change back to 'update' to keep your data
# ============================================================
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# Thymeleaf
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=SmartLogisticsSecretKey2024VeryLongSecretKeyForJWTTokenGeneration
app.jwt.expiration=86400000
app.jwt.prefix=Bearer 
app.jwt.header=Authorization

# ============================================================
# File Upload
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# Logging
# ============================================================
logging.level.com.logistics=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ============================================================
# Application Info
# ============================================================
app.name=Smart Logistics SCM
app.version=1.0.0
app.company=SmartLogistics Inc.