<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{fragments/layout :: head('Suppliers')}"></head>
<body class="layout-wrapper">
<div th:replace="~{fragments/layout :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/layout :: navbar}"></div>
    <div class="page-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Suppliers</h1>
                <p class="page-subtitle">Manage your supplier network</p>
            </div>
            <div class="page-actions">
                <a th:href="@{/suppliers/new}" class="btn btn-primary">
                    <i class="bi bi-plus-lg me-1"></i>Add Supplier
                </a>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible d-flex" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="mini-stat">
                    <span class="mini-stat-label">Total Suppliers</span>
                    <span class="mini-stat-value" th:text="${#lists.size(suppliers)}">0</span>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="mini-stat">
                    <span class="mini-stat-label">Active</span>
                    <span class="mini-stat-value text-success" th:text="${#lists.size(suppliers.?[status.name() == 'ACTIVE'])}">0</span>
                </div>
            </div>
        </div>

        <div class="card-panel">
            <div class="panel-header">
                <h3 class="panel-title">All Suppliers</h3>
                <div class="panel-actions">
                    <button class="btn btn-sm btn-outline-secondary" onclick="exportTable()">
                        <i class="bi bi-download me-1"></i>Export
                    </button>
                </div>
            </div>
            <div class="table-responsive">
                <table id="suppliersTable" class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Name</th>
                            <th>Contact</th>
                            <th>City</th>
                            <th>Country</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${suppliers}">
                            <td><code th:text="${s.code}">S001</code></td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="entity-avatar" th:text="${#strings.substring(s.name,0,1)}">S</div>
                                    <div>
                                        <div class="fw-600" th:text="${s.name}">Name</div>
                                        <small class="text-muted" th:text="${s.email}">email</small>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <div th:text="${s.contactPerson}">Person</div>
                                <small class="text-muted" th:text="${s.phone}">Phone</small>
                            </td>
                            <td th:text="${s.city}">City</td>
                            <td th:text="${s.country}">Country</td>
                            <td>
                                <span class="badge-status"
                                      th:classappend="${s.status.name() == 'ACTIVE'} ? 'status-delivered' :
                                                      (${s.status.name() == 'INACTIVE'} ? 'status-default' : 'status-pending')"
                                      th:text="${s.status}">ACTIVE</span>
                            </td>
                            <td>
                                <div class="action-btns">
                                    <a th:href="@{/suppliers/{id}/edit(id=${s.id})}" class="btn btn-xs btn-outline-primary" title="Edit">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/suppliers/{id}/delete(id=${s.id})}" method="post" class="d-inline"
                                          onsubmit="return confirmDelete(this, 'supplier')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-xs btn-outline-danger" title="Delete">
                                            <i class="bi bi-trash3"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <footer class="app-footer"><span>&copy; 2024 Smart Logistics SCM</span><span>v1.0.0</span></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
$(document).ready(function() { $('#suppliersTable').DataTable({ pageLength: 15, order: [[0,'asc']] }); });
</script>
</body>
</html>
