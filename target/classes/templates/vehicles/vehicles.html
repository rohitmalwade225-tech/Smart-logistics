<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Fleet Management')}"></head>
<body class="layout-wrapper">
<div th:replace="~{fragments/layout :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/layout :: navbar}"></div>
    <div class="page-content">
        <div class="page-header">
            <div><h1 class="page-title">Fleet Management</h1><p class="page-subtitle">Manage your vehicle fleet</p></div>
            <a th:href="@{/vehicles/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Vehicle</a>
        </div>
        <div th:if="${success}" class="alert alert-success alert-dismissible d-flex" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div class="row g-4">
            <div class="col-12 col-md-6 col-xl-4" th:each="v : ${vehicles}">
                <div class="vehicle-card">
                    <div class="vehicle-header">
                        <div class="vehicle-icon">
                            <i th:class="${v.type != null && v.type.name() == 'VAN'} ? 'bi bi-truck-flatbed' : 'bi bi-truck'"></i>
                        </div>
                        <div class="vehicle-title">
                            <h5 class="fw-700" th:text="${v.licensePlate}">PLATE</h5>
                            <span class="text-muted" th:text="${v.make} + ' ' + ${v.model} + ' (' + ${v.year} + ')'">Make Model Year</span>
                        </div>
                        <span class="badge-status ms-auto"
                              th:classappend="${v.status.name() == 'AVAILABLE'} ? 'status-delivered' :
                                              (${v.status.name() == 'ON_ROUTE'} ? 'status-shipped' :
                                              (${v.status.name() == 'IN_MAINTENANCE'} ? 'status-warning' : 'status-default'))"
                              th:text="${#strings.replace(v.status.name(), '_', ' ')}">Status</span>
                    </div>
                    <div class="vehicle-details">
                        <div class="vehicle-detail-item">
                            <i class="bi bi-person-fill text-muted"></i>
                            <span th:text="${v.driverName ?: 'No driver assigned'}">Driver</span>
                        </div>
                        <div class="vehicle-detail-item">
                            <i class="bi bi-telephone text-muted"></i>
                            <span th:text="${v.driverPhone ?: '-'}">Phone</span>
                        </div>
                        <div class="vehicle-detail-item">
                            <i class="bi bi-box2 text-muted"></i>
                            <span th:text="${v.maxLoadCapacity} + ' ' + ${v.capacityUnit ?: 'kg'}">Capacity</span>
                        </div>
                        <div class="vehicle-detail-item" th:if="${v.nextMaintenanceDate != null}">
                            <i class="bi bi-wrench text-muted"></i>
                            <span>Next service: <strong th:text="${v.nextMaintenanceDate}">Date</strong></span>
                        </div>
                    </div>
                    <div class="vehicle-actions">
                        <a th:href="@{/vehicles/{id}/edit(id=${v.id})}" class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil me-1"></i>Edit</a>
                        <form th:action="@{/vehicles/{id}/delete(id=${v.id})}" method="post" class="d-inline" onsubmit="return confirmDelete(this, 'vehicle')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash3 me-1"></i>Delete</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-12 text-center text-muted py-5" th:if="${#lists.isEmpty(vehicles)}">
                <i class="bi bi-truck fs-1 d-block mb-3"></i>No vehicles in fleet
            </div>
        </div>
    </div>
    <footer class="app-footer"><span>&copy; 2024 Smart Logistics SCM</span><span>v1.0.0</span></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
