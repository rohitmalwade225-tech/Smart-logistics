<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Vehicle Form')}"></head>
<body class="layout-wrapper">
<div th:replace="~{fragments/layout :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/layout :: navbar}"></div>
    <div class="page-content">
        <div class="page-header">
            <div><h1 class="page-title" th:text="${pageTitle}">Vehicle</h1></div>
            <a th:href="@{/vehicles}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
        </div>
        <div class="row justify-content-center">
            <div class="col-12 col-xl-9">
                <div class="card-panel">
                    <form th:action="@{/vehicles/save}" method="post" th:object="${vehicle}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" th:field="*{id}"/>
                        <div class="form-section">
                            <h5 class="form-section-title"><i class="bi bi-truck me-2"></i>Vehicle Details</h5>
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label required">License Plate</label>
                                    <input type="text" th:field="*{licensePlate}" class="form-control"
                                           th:classappend="${#fields.hasErrors('licensePlate')} ? 'is-invalid'" placeholder="e.g., CA-TRK-001"/>
                                    <div class="invalid-feedback" th:errors="*{licensePlate}"></div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Make</label>
                                    <input type="text" th:field="*{make}" class="form-control" placeholder="Manufacturer"/>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Model</label>
                                    <input type="text" th:field="*{model}" class="form-control" placeholder="Model name"/>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Year</label>
                                    <input type="number" th:field="*{year}" class="form-control" min="1990" max="2030" placeholder="2024"/>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Type</label>
                                    <select th:field="*{type}" class="form-select">
                                        <option value="">Select type</option>
                                        <option th:each="t : ${vehicleTypes}" th:value="${t}" th:text="${t}">Type</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Max Load (kg)</label>
                                    <input type="number" th:field="*{maxLoadCapacity}" class="form-control" step="0.01" min="0" placeholder="0.00"/>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Status</label>
                                    <select th:field="*{status}" class="form-select">
                                        <option th:each="s : ${vehicleStatuses}" th:value="${s}" th:text="${#strings.replace(s.name(), '_', ' ')}">Status</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-section">
                            <h5 class="form-section-title"><i class="bi bi-person me-2"></i>Driver Information</h5>
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">Driver Name</label>
                                    <input type="text" th:field="*{driverName}" class="form-control" placeholder="Driver name"/>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Driver Phone</label>
                                    <input type="text" th:field="*{driverPhone}" class="form-control" placeholder="+1-555-0000"/>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">License Number</label>
                                    <input type="text" th:field="*{driverLicense}" class="form-control" placeholder="License #"/>
                                </div>
                            </div>
                        </div>
                        <div class="form-section">
                            <h5 class="form-section-title"><i class="bi bi-calendar-check me-2"></i>Important Dates</h5>
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">Last Maintenance</label>
                                    <input type="date" th:field="*{lastMaintenanceDate}" class="form-control"/>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Next Maintenance</label>
                                    <input type="date" th:field="*{nextMaintenanceDate}" class="form-control"/>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Insurance Expiry</label>
                                    <input type="date" th:field="*{insuranceExpiry}" class="form-control"/>
                                </div>
                            </div>
                        </div>
                        <div class="form-actions">
                            <a th:href="@{/vehicles}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-check2 me-1"></i>Save Vehicle</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <footer class="app-footer"><span>&copy; 2024 Smart Logistics SCM</span><span>v1.0.0</span></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
