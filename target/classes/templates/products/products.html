<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Products')}"></head>
<body class="layout-wrapper">
<div th:replace="~{fragments/layout :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/layout :: navbar}"></div>
    <div class="page-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Products</h1>
                <p class="page-subtitle">Manage your product catalog</p>
            </div>
            <a th:href="@{/products/new}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>Add Product
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible d-flex" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card-panel">
            <div class="table-responsive">
                <table id="productsTable" class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Supplier</th>
                            <th>Unit Price</th>
                            <th>Reorder Pt.</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${products}">
                            <td><code th:text="${p.sku}">SKU</code></td>
                            <td>
                                <div class="fw-600" th:text="${p.name}">Name</div>
                                <small class="text-muted" th:text="${p.brand}">Brand</small>
                            </td>
                            <td th:text="${p.categoryName ?: '-'}">Category</td>
                            <td th:text="${p.supplierName ?: '-'}">Supplier</td>
                            <td th:text="'$' + ${#numbers.formatDecimal(p.unitPrice, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                            <td>
                                <span class="badge bg-light text-dark" th:text="${p.reorderPoint}">10</span>
                            </td>
                            <td>
                                <span class="badge-status"
                                      th:classappend="${p.status.name() == 'ACTIVE'} ? 'status-delivered' :
                                                      (${p.status.name() == 'INACTIVE'} ? 'status-default' : 'status-pending')"
                                      th:text="${p.status}">Status</span>
                            </td>
                            <td>
                                <div class="action-btns">
                                    <a th:href="@{/products/{id}/edit(id=${p.id})}" class="btn btn-xs btn-outline-primary"><i class="bi bi-pencil"></i></a>
                                    <form th:action="@{/products/{id}/delete(id=${p.id})}" method="post" class="d-inline" onsubmit="return confirmDelete(this, 'product')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-xs btn-outline-danger"><i class="bi bi-trash3"></i></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <footer class="app-footer"><span>&copy; 2024 Smart Logistics SCM</span><span>v1.0.0</span></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
$(document).ready(function() { $('#productsTable').DataTable({ pageLength: 15 }); });
</script>
</body>
</html>
