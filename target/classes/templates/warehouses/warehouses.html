<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Warehouses')}"></head>
<body class="layout-wrapper">
<div th:replace="~{fragments/layout :: sidebar}"></div>
<div class="main-content">
    <div th:replace="~{fragments/layout :: navbar}"></div>
    <div class="page-content">
        <div class="page-header">
            <div><h1 class="page-title">Warehouses</h1><p class="page-subtitle">Manage your warehouse network</p></div>
            <a th:href="@{/warehouses/new}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Warehouse</a>
        </div>
        <div th:if="${success}" class="alert alert-success alert-dismissible d-flex" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Warehouse Cards -->
        <div class="row g-4 mb-4">
            <div class="col-12 col-md-6 col-xl-4" th:each="w : ${warehouses}">
                <div class="warehouse-card">
                    <div class="warehouse-card-header">
                        <div class="warehouse-icon"><i class="bi bi-house-gear"></i></div>
                        <div class="warehouse-meta">
                            <h5 class="warehouse-name" th:text="${w.name}">Warehouse</h5>
                            <span class="warehouse-code" th:text="${w.code}">WH-001</span>
                        </div>
                        <span class="badge-status ms-auto"
                              th:classappend="${w.status.name() == 'ACTIVE'} ? 'status-delivered' : 'status-default'"
                              th:text="${w.status}">ACTIVE</span>
                    </div>
                    <div class="warehouse-location">
                        <i class="bi bi-geo-alt text-muted me-1"></i>
                        <span th:text="${w.city} + ', ' + ${w.country}">City, Country</span>
                    </div>
                    <div class="capacity-section">
                        <div class="d-flex justify-content-between mb-1">
                            <small class="text-muted">Capacity Utilization</small>
                            <small class="fw-600" th:text="${#numbers.formatDecimal(w.utilizationPercent, 1, 1)} + '%'">0%</small>
                        </div>
                        <div class="progress capacity-progress">
                            <div class="progress-bar"
                                 th:classappend="${w.utilizationPercent > 85} ? 'bg-danger' :
                                                 (${w.utilizationPercent > 65} ? 'bg-warning' : 'bg-success')"
                                 role="progressbar"
                                 th:style="'width:' + ${w.utilizationPercent} + '%'"></div>
                        </div>
                        <div class="d-flex justify-content-between mt-1">
                            <small class="text-muted" th:text="${w.usedCapacity} + ' / ' + ${w.totalCapacity} + ' ' + ${w.capacityUnit}">Used/Total</small>
                        </div>
                    </div>
                    <div class="warehouse-manager">
                        <i class="bi bi-person me-1 text-muted"></i>
                        <span th:text="${w.managerName ?: 'No manager assigned'}">Manager</span>
                    </div>
                    <div class="warehouse-actions">
                        <a th:href="@{/warehouses/{id}/edit(id=${w.id})}" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-pencil me-1"></i>Edit
                        </a>
                        <form th:action="@{/warehouses/{id}/delete(id=${w.id})}" method="post" class="d-inline"
                              onsubmit="return confirmDelete(this, 'warehouse')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash3 me-1"></i>Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="app-footer"><span>&copy; 2024 Smart Logistics SCM</span><span>v1.0.0</span></footer>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
